gesdinet_jwt_refresh_token:
    refresh_token_class: App\Entity\RefreshToken
    ttl: 2592000
    ttl_update: true
    single_use: true
    cookie:
        enabled: true
        same_site: none
        path: /
        domain: null
        http_only: true
        secure: true
        partitioned: false
        remove_token_from_body: true
